<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#0a1430"/>
      <stop offset="100%" stop-color="#05080f"/>
    </radialGradient>
    <radialGradient id="vegaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff6e0" stop-opacity="1"/>
      <stop offset="35%" stop-color="#ffc15e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffc15e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- backdrop -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Lyra: small triangle at top (Vega + Epsilon), parallelogram body below.
       Coordinates are a stylized but faithful rendering of the figure. -->
  <g stroke="#ffc15e" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"
     fill="none" opacity="0.55">
    <!-- triangle: Vega -> Epsilon -> Zeta -> Vega -->
    <path d="M20 16 L31 13 L26 27 Z"/>
    <!-- parallelogram: Zeta -> Delta -> Gamma(Sulafat) -> Beta(Sheliak) -> Zeta -->
    <path d="M26 27 L40 24 L45 41 L31 44 Z"/>
  </g>

  <!-- dim member stars -->
  <g fill="#cdd8f5">
    <circle cx="31" cy="13" r="1.4"/>   <!-- Epsilon -->
    <circle cx="26" cy="27" r="1.5"/>   <!-- Zeta -->
    <circle cx="40" cy="24" r="1.6"/>   <!-- Delta -->
    <circle cx="45" cy="41" r="1.7"/>   <!-- Sulafat -->
    <circle cx="31" cy="44" r="1.6"/>   <!-- Sheliak -->
  </g>

  <!-- Vega: the bright namesake star -->
  <circle cx="20" cy="16" r="9" fill="url(#vegaGlow)"/>
  <circle cx="20" cy="16" r="2.6" fill="#ffffff"/>
</svg>
